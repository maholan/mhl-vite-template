<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>MHL UI</title>
    <meta name="description" content="Vite React components built on React Aria and Tailwind CSS v4." />
    <!-- Inter font — CDN fallback. Replace with self-hosted /fonts/inter-variable.woff2 for production. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
    <!--
      Theme script is injected by main.tsx at runtime via ThemeScript from @maholan/theme.
      It runs before React hydrates, preventing flash of wrong theme (FOWT).
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
